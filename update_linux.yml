---
- name: Kompletní a bezpečný update Debianu
  hosts: all
  vars:
    # Globální nastavení pro ignorování interaktivních oken (vždy dá výchozí/No)
    apt_env:
      DEBIAN_FRONTEND: noninteractive
      APT_LISTCHANGES_FRONTEND: none

  tasks:
    - name: 1. První APT Update (s opakováním při chybě sítě)
      ansible.builtin.apt:
        update_cache: yes
      environment: "{{ apt_env }}"
      register: apt_update_1
      # Opakuj příkaz, pokud selže (např. kvůli síti)
      until: apt_update_1 is success
      retries: 3    # Zkusí to maximálně 3x
      delay: 5      # Mezi pokusy počká 10 vteřin

    - name: 2. První APT Upgrade
      ansible.builtin.apt:
        upgrade: dist
        # Zabrání přepsání konfiguráků (odpoví "No" na dotazy)
        dpkg_options: "force-confold,force-confdef"
      environment: "{{ apt_env }}"

    - name: 3. Druhý APT Update (po upgradu)
      ansible.builtin.apt:
        update_cache: yes
      environment: "{{ apt_env }}"
      register: apt_update_2
      until: apt_update_2 is success
      retries: 3
      delay: 10

    - name: 4. Druhý APT Upgrade
      ansible.builtin.apt:
        upgrade: dist
        dpkg_options: "force-confold,force-confdef"
      environment: "{{ apt_env }}"

    - name: 5. Čištění systému (Autoremove a Clean)
      ansible.builtin.apt:
        autoremove: yes
        autoclean: yes
      environment: "{{ apt_env }}"

    - name: Kontrola, zda je vyžadován restart
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Restartování serveru v případě potřeby
      ansible.builtin.reboot:
        msg: "Ansible restartuje server po aktualizaci"
        reboot_timeout: 600
      when: reboot_required_file.stat.exists
