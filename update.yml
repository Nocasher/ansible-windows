---
- name: Vyhledat a nainstalovat Windows Updates vč. ovladačů (bez Preview)
  hosts: all
  tasks:
    - name: Odhlásit všechny uživatele kromě bota/admina
      ansible.windows.win_powershell:
        script: |
          # Získání všech uživatelských relací
          $sessions = quser
          
          # Projdeme každý řádek z výpisu quser (vynecháme záhlaví)
          foreach ($session in $sessions[1..$sessions.Length]) {
              if ($session -match "(\s+)(?<username>[a-zA-Z0-9\.\-_]+)(\s+)") {
                  $user = $Matches['username'].Trim()
                  
                  # VÝJIMKA: Zde zadej uživatele, pod kterým běží Ansible/Semaphore, aby se neodhlásil!
                  if ($user -ieq "Administrator") {
                      Write-Host "Vynechávám uživatele: $user"
                      continue
                  }
                  
                  # Vytáhneme ID relace a uživatele odhlásíme
                  if ($session -match "(?<id>\d+)\s+Disc" -or $session -match "(?ValidActive)\s+\d+\s+(?<id>\d+)") {
                      $id = $Matches['id']
                      Write-Host "Odhlašuji uživatele $user (ID: $id)"
                      logoff $id
                  }
              }
          }

    # --- NOVÉ ÚKOLY PRO VÝPIS WINDOWS UPDATES ---
    - name: Pouze vyhledat dostupné aktualizace (bez instalace)
      ansible.windows.win_updates:
        category_names:
          - CriticalUpdates
          - SecurityUpdates
          - UpdateRollups
          - Updates
          - DefinitionUpdates
          - Drivers
        reject_list:
          - ".*Preview.*"
        state: searched # Tento parametr zajistí, že se nic neinstaluje
      register: win_updates_list

    - name: VYPSAT DO KONZOLE DOSTUPNÉ WINDOWS AKTUALIZACE
      ansible.builtin.debug:
        msg: >-
          {% set updates = [] %}
          {% for id, update in win_updates_list.updates.items() %}
            {% set _ = updates.append(update.title) %}
          {% endfor %}
          {{ updates }}
    # --------------------------------------------

    - name: Instalace kompletních aktualizací a ovladačů
      ansible.windows.win_updates:
        category_names:
          - CriticalUpdates
          - SecurityUpdates
          - UpdateRollups
          - Updates
          - DefinitionUpdates
          - Drivers
        reject_list:
          - ".*Preview.*"
        state: installed # Teď je reálně nainstalujeme
        reboot: yes
        reboot_timeout: 1200
